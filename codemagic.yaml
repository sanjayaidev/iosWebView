workflows:
  ios-workflow:
    name: iOS WebView App
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "WebViewApp.xcworkspace"
        XCODE_SCHEME: "WebViewApp"
        BUNDLE_ID: "com.yourcompany.webviewapp"  # Change this to something unique!
        XCODE_VERSION: "15.0"
        APPLE_ID: "$APPLE_ID"  # Your Apple ID email
        APPLE_ID_PASSWORD: "$APPLE_ID_PASSWORD"  # Your Apple ID password (or app-specific password)
      ios_signing:
        distribution_type: development
        bundle_identifier: $BUNDLE_ID
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          if [ -f "ios/Podfile" ]; then
            cd ios
            pod install
            cd ..
          fi
      - name: Set up automatic provisioning
        script: |
          xcode-project use-profiles \
            --type development \
            --bundle-id "$BUNDLE_ID" \
            --apple-id "$APPLE_ID" \
            --apple-id-password "$APPLE_ID_PASSWORD"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa

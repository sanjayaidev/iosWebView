workflows:
  ios-workflow:
    name: iOS WebView App (Unsigned Build)
    max_build_duration: 60
    environment:
      xcode: 15.0
      vars:
        XCODE_PROJECT: "WebViewApp/WebViewApp.xcodeproj"
        XCODE_SCHEME: "WebViewApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Build unsigned .app for device
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            clean build
      - name: Package as unsigned IPA
        script: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/WebViewApp.app build/Payload/
          cd build && zip -r ../unsigned-WebViewApp.ipa Payload
    artifacts:
      - unsigned-WebViewApp.ipa

workflows:
  ios-workflow:
    name: iOS WebView App
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "WebViewApp.xcworkspace"
        XCODE_SCHEME: "WebViewApp"
        BUNDLE_ID: "com.yourcompany.webviewapp"
        XCODE_VERSION: "15.0"
      # Use automatic signing - no certificates needed!
      ios_signing:
        distribution_type: development
        bundle_identifier: $BUNDLE_ID
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          if [ -f "ios/Podfile" ]; then
            cd ios
            pod install
            cd ..
          fi
      - name: Set up automatic signing
        script: |
          xcode-project use-profiles \
            --type development \
            --bundle-id "$BUNDLE_ID"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
